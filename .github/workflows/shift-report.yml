name: BBW shift report

on:
  schedule:
    # Hourly. The script works out which shift just ended in Toronto time
    # (handles EST/EDT), and skips if that report was already sent — so a
    # delayed or failed run heals itself on the next hour.
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Shift date (YYYY-MM-DD) — blank = the shift that just ended'
        required: false
      shift:
        description: 'Day or Night'
        required: false
      dry_run:
        description: 'Print the email instead of sending it'
        type: boolean
        default: false
      diagnose:
        description: 'Ask Brevo which account this key belongs to and what it can send'
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install PDF libraries
        run: npm install --no-audit --no-fund
      - name: Send shift report
        env:
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          SMTP_HOST:      ${{ vars.SMTP_HOST || 'smtp.office365.com' }}
          BREVO_API_KEY:  ${{ secrets.BREVO_API_KEY }}
          BREVO_FROM:     ${{ vars.BREVO_FROM || secrets.BREVO_FROM }}
          REPORT_TO:      ${{ vars.REPORT_TO || secrets.REPORT_TO || 'maintenance@brunswickbierworks.com' }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ];  then ARGS="$ARGS --date ${{ github.event.inputs.date }}"; fi
          if [ -n "${{ github.event.inputs.shift }}" ]; then ARGS="$ARGS --shift ${{ github.event.inputs.shift }}"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.diagnose }}" = "true" ]; then ARGS="--diagnose"; fi
          node scripts/send-shift-report.mjs $ARGS
