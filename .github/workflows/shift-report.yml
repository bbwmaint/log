name: BBW shift report

# Scheduling lives in Supabase (pg_cron), which fires on time — GitHub's own
# scheduler ran late and sometimes skipped runs entirely. Supabase triggers this
# workflow via the API; you can also run it by hand from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Shift date (YYYY-MM-DD) — blank = the shift that just ended'
        required: false
      shift:
        description: 'Day or Night'
        required: false
      dry_run:
        description: 'Print the email instead of sending it'
        type: boolean
        default: false
      force:
        description: 'Send again even if this shift was already sent'
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install PDF libraries
        run: npm install --no-audit --no-fund
      - name: Send shift report
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          EMAILJS_PUBLIC_KEY:  ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          EMAILJS_SERVICE:     ${{ vars.EMAILJS_SERVICE  || 'service_q7rtzse' }}
          EMAILJS_TEMPLATE:    ${{ vars.EMAILJS_TEMPLATE || 'template_i01whhv' }}
          REPORT_TO:           ${{ vars.REPORT_TO || 'maintenance@brunswickbierworks.com' }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ];  then ARGS="$ARGS --date ${{ github.event.inputs.date }}"; fi
          if [ -n "${{ github.event.inputs.shift }}" ]; then ARGS="$ARGS --shift ${{ github.event.inputs.shift }}"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.force }}"   = "true" ]; then ARGS="$ARGS --force"; fi
          node scripts/send-shift-report.mjs $ARGS
